<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VibeFix | Sign Up & Log In</title>
    <meta name="description" content="Sign up or sign in to your VibeFix account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0A0A0F;
        --card: #12121A;
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(34, 211, 238, 0.3);
        --input: #171724;
        --input-border: rgba(255, 255, 255, 0.12);
        --text: #F1F5F9;
        --muted: #94A3B8;
        --accent: #22D3EE;
        --accent-hover: #06B6D4;
        --danger: #F87171;
        --success: #4ADE80;
        --glow: 0 0 20px rgba(34, 211, 238, 0.15);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "Outfit", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, 0.12), transparent 40%),
          linear-gradient(180deg, #111118 0%, #0A0A0F 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .shell {
        width: 100%;
        max-width: 440px;
        padding: 24px;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .logo-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        text-decoration: none;
        color: var(--text);
      }

      .logo-row svg {
        width: 32px;
        height: 32px;
        fill: var(--accent);
      }

      .logo-row span {
        font-weight: 800;
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      .logo-row span span {
        color: var(--accent);
        font-weight: 800;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 36px 32px;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border: 1px solid rgba(34, 211, 238, 0.2);
        border-radius: 999px;
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      p.subtitle {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .stack { display: grid; gap: 16px; }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        color: var(--text);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid var(--input-border);
        background: var(--input);
        color: var(--text);
        outline: none;
        font-family: inherit;
        font-size: 15px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 12px rgba(34, 211, 238, 0.15);
      }

      .button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 14px 16px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .button:active { transform: scale(0.98); }
      .button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
        box-shadow: none !important;
      }

      .button.primary {
        background: var(--accent);
        color: #05050A;
      }

      .button.primary:hover:not(:disabled) {
        background: var(--accent-hover);
        box-shadow: 0 0 16px rgba(34, 211, 238, 0.25);
      }

      .button.google {
        background: #171724;
        color: var(--text);
        border: 1px solid var(--input-border);
      }

      .button.google:hover:not(:disabled) {
        border-color: var(--border-hover);
        background: #1C1C2C;
      }

      .google-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 16px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 8px 0;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        background: var(--border);
      }

      .message {
        min-height: 24px;
        font-size: 14px;
        color: var(--muted);
        line-height: 1.5;
        text-align: center;
        margin-top: 12px;
        padding: 10px;
        border-radius: 6px;
        transition: all 0.3s;
      }

      .message.error {
        color: #FF8A8A;
        background: rgba(248, 113, 113, 0.08);
        border: 1px solid rgba(248, 113, 113, 0.15);
      }

      .message.success {
        color: #8AFF8A;
        background: rgba(74, 222, 128, 0.08);
        border: 1px solid rgba(74, 222, 128, 0.15);
      }

      .footer {
        margin-top: 24px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        line-height: 1.6;
      }

      .footer a {
        color: var(--accent);
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="shell">
      <a class="logo-row" href="/">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 2 3 6.8l9 4.8 9-4.8L12 2Zm0 5.1 4.7-2.5L12 2.9 7.3 4.6 12 7.1ZM3 10.2l9 4.8 9-4.8v3.4l-9 4.8-9-4.8v-3.4Zm0 6.2 9 4.8 9-4.8v2.8l-9 4.8-9-4.8v-2.8Z"/></svg>
        <span>Vibe<span>Fix</span></span>
      </a>

      <section class="card">
        <span class="eyebrow">Secure Access</span>
        <h1>Welcome to VibeFix</h1>
        <p class="subtitle">Create your account or log in to access diagnosis reports.</p>

        <div class="stack">
          <!-- Google Auth at the TOP -->
          <button class="button google" id="google-btn" type="button" aria-label="Continue with Google">
            <svg class="google-icon" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.266 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.156 7.962 3.038l5.657-5.657C34.053 6.053 29.299 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.651-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.967 12 24 12c3.059 0 5.842 1.156 7.962 3.038l5.657-5.657C34.053 6.053 29.299 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.187 0 9.91-1.986 13.463-5.216l-6.23-5.268C29.206 35.091 26.771 36 24 36c-5.245 0-9.618-3.322-11.286-7.946l-6.52 5.025C9.504 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-1.254 3.479-4.023 6.165-7.07 7.516l.002-.001 6.23 5.268C33.99 39.49 40 35 40 24c0-1.341-.138-2.651-.389-3.917z"/>
            </svg>
            Continue with Google
          </button>

          <div class="divider">or</div>

          <!-- Email Passwordless Magic Link form below Google -->
          <form id="login-form" class="stack" novalidate>
            <label for="email">
              Email Address
            </label>
            <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
            <button class="button primary" type="submit" id="submit-btn">Continue with Email</button>
          </form>

          <div id="message" class="message" aria-live="polite" hidden></div>
        </div>

        <div class="footer">
          We'll email you a secure link to log in or create an account instantly. No password required.
        </div>
      </section>
    </main>

    <script>
      const SUPABASE_URL = "https://fraufatburxkfynjbidq.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyYXVmYXRidXJ4a2Z5bmpiaWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTU3NTgsImV4cCI6MjA5NjEzMTc1OH0.OXbuf7O9vbyYLaTKFZA99Rw3_j_E4-LqcXyRH3heQB0";
      const NEXT_PATH = new URLSearchParams(window.location.search).get("next") || "/dashboard/ai";
      const REDIRECT_TO = `${window.location.origin}/auth/callback.html?next=${encodeURIComponent(NEXT_PATH)}`;
      
      const SUPABASE = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true, flowType: "pkce" }
      });

      const message = document.getElementById("message");
      const emailInput = document.getElementById("email");
      const loginForm = document.getElementById("login-form");
      const googleBtn = document.getElementById("google-btn");
      const submitBtn = document.getElementById("submit-btn");
      let googleOAuthEnabled = true;

      function setMessage(text, kind = "") {
        if (!text) {
          message.hidden = true;
          message.textContent = "";
          message.className = "message";
          return;
        }
        message.hidden = false;
        message.textContent = text;
        message.className = `message${kind ? ` ${kind}` : ""}`;
      }

      function disableUi(disable) {
        emailInput.disabled = disable;
        submitBtn.disabled = disable;
        googleBtn.disabled = disable;
      }

      fetch("/api/config", { cache: "no-store" })
        .then((response) => response.ok ? response.json() : null)
        .then((config) => {
          googleOAuthEnabled = config?.googleOAuthEnabled !== false;
          if (!googleOAuthEnabled) {
            googleBtn.disabled = true;
            googleBtn.title = "Google sign-in is not enabled in this deployment.";
          }
        })
        .catch(() => {});

      async function exchangeSession(session) {
        if (!session?.access_token) return false;
        const response = await fetch("/api/auth/exchange", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ accessToken: session.access_token })
        });
        return response.ok;
      }

      googleBtn.addEventListener("click", async () => {
        if (!googleOAuthEnabled) {
          setMessage("Google sign-in is not enabled in Supabase yet.", "error");
          return;
        }
        setMessage("Redirecting to Google...");
        disableUi(true);
        const { error } = await SUPABASE.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: REDIRECT_TO,
            scopes: "https://www.googleapis.com/auth/userinfo.email"
          }
        });
        if (error) {
          setMessage(error.message || "Google sign-in failed.", "error");
          disableUi(false);
        }
      });

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const email = emailInput.value.trim().toLowerCase();
        
        if (!email) {
          setMessage("Please enter a valid email address.", "error");
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          setMessage("Please enter a valid email address format.", "error");
          return;
        }

        setMessage("Sending magic link...");
        disableUi(true);

        try {
          const response = await fetch("/auth/email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, next: NEXT_PATH })
          });

          const data = await response.json();
          if (response.ok && data.ok) {
            setMessage("Magic link sent! Check your inbox to sign in or create your account.", "success");
            loginForm.reset();
          } else {
            setMessage(data.error || "Could not send magic link. Try again.", "error");
            disableUi(false);
          }
        } catch (error) {
          setMessage("Network error. Could not send magic link. Please try again.", "error");
          disableUi(false);
        }
      });

      // Handle active session redirects
      (async () => {
        const { data } = await SUPABASE.auth.getSession();
        if (data.session) {
          setMessage("Redirecting to your dashboard...");
          const synced = await exchangeSession(data.session);
          if (synced) {
            window.location.href = NEXT_PATH;
          } else {
            setMessage("Login synced, but session activation failed. Redirecting...", "success");
            setTimeout(() => { window.location.href = NEXT_PATH; }, 1000);
          }
        }
      })();
    </script>
  </body>
</html>
