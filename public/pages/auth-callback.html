<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VibeFix | Completing sign in</title>
    <meta name="description" content="Completing your VibeFix sign in." />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --card: #111111;
        --border: #1f1f1f;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --success: #4ade80;
        --danger: #f87171;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, 0.12), transparent 26%),
          linear-gradient(180deg, #111111 0%, #0a0a0a 100%);
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 420px);
        border-radius: 12px;
        background: var(--card);
        border: 1px solid var(--border);
        padding: 28px;
      }

      .spinner {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        border: 3px solid rgba(148, 163, 184, 0.24);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
        margin-bottom: 18px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status {
        margin-top: 16px;
        min-height: 22px;
        font-size: 14px;
        color: var(--muted);
      }

      .status.error { color: var(--danger); }
      .status.success { color: var(--success); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="spinner" aria-hidden="true"></div>
        <h1>Completing sign in…</h1>
        <p>Please wait while we finish connecting your account.</p>
        <div id="status" class="status" aria-live="polite"></div>
      </section>
    </main>

    <script>
      const SUPABASE_URL = "https://fraufatburxkfynjbidq.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyYXVmYXRidXJ4a2Z5bmpiaWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTU3NTgsImV4cCI6MjA5NjEzMTc1OH0.OXbuf7O9vbyYLaTKFZA99Rw3_j_E4-LqcXyRH3heQB0";
      const NEXT_PATH = new URLSearchParams(window.location.search).get("next") || "/dashboard/ai";
      const SUPABASE = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true, flowType: "pkce" }
      });

      const status = document.getElementById("status");

      function setStatus(text, kind = "") {
        status.textContent = text;
        status.className = `status${kind ? ` ${kind}` : ""}`;
      }

      async function exchangeSession(session) {
        if (!session?.access_token) return false;
        const response = await fetch("/api/auth/exchange", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ accessToken: session.access_token })
        });
        return response.ok;
      }

      (async () => {
        try {
          setStatus("Completing sign in…");
          const { data, error } = await SUPABASE.auth.getSession();

          if (error || !data?.session) {
            throw error || new Error("No session returned.");
          }

          const session = data.session;
          const synced = await exchangeSession(session);
          if (!synced) {
            throw new Error("Could not sync the app session.");
          }

          setStatus("Success! Redirecting…", "success");
          window.location.replace(NEXT_PATH);
        } catch (err) {
          console.error(err);
          setStatus("Could not complete sign in. Redirecting to login…", "error");
          window.location.replace(`/login.html?next=${encodeURIComponent(NEXT_PATH)}`);
        }
      })();
    </script>
  </body>
</html>
